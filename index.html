<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf7f2" />
    <title>The Dubai Mall — Interactive Sales Deck</title>
    <meta name="description" content="An interactive sales experience for the world's most-visited destination. Leasing, sponsorships, and venue bookings at The Dubai Mall." />
    <meta name="author" content="The Dubai Mall Commercial" />

    <!-- Preconnect & font preload for faster LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Preload hero poster for fast LCP on opening slide -->
    <link rel="preload" as="image" href="/video/hero-poster.jpg" fetchpriority="high" />

    <meta property="og:title" content="The Dubai Mall — Interactive Sales Deck" />
    <meta property="og:description" content="The world's most-visited destination. 105M+ visitors. 1,200+ stores. One unmatched commercial platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/video/hero-poster.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/video/hero-poster.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
